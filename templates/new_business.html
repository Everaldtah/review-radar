<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Business — Review Radar</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7fafc;color:#2d3748}
  header{background:#1a202c;color:white;padding:16px 32px}
  .container{max-width:560px;margin:32px auto;padding:0 16px}
  .card{background:white;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.1);padding:32px}
  label{display:block;font-weight:600;font-size:.9rem;color:#4a5568;margin-bottom:4px}
  input,select{width:100%;padding:10px 12px;border:1px solid #e2e8f0;border-radius:6px;font-size:1rem;margin-bottom:16px}
  .btn{width:100%;padding:11px;border-radius:6px;background:#2b6cb0;color:white;border:none;font-weight:600;font-size:1rem;cursor:pointer}
  h2{font-size:1.1rem;margin-bottom:24px}
  .hint{font-size:.75rem;color:#a0aec0;margin-top:-12px;margin-bottom:16px}
  a{color:#2b6cb0}
  .divider{border:none;border-top:1px solid #edf2f7;margin:16px 0}
</style>
</head>
<body>
<header><h1 style="font-size:1.3rem">📡 Review Radar</h1></header>
<div class="container">
  <div class="card">
    <h2>Add a Business to Monitor</h2>
    <form method="post" action="/business/new">
      <label>Business Name *</label>
      <input type="text" name="name" placeholder="Joe's Pizza" required>

      <hr class="divider">
      <p style="font-size:.85rem;color:#718096;margin-bottom:12px">Connect review platforms (optional — demo reviews shown if not connected):</p>

      <label>Google Place ID</label>
      <input type="text" name="google_place_id" placeholder="ChIJN1t_tDeuEmsRUsoyG83frY4">
      <div class="hint">Find your Place ID at <a href="https://developers.google.com/maps/documentation/javascript/examples/places-placeid-finder" target="_blank">Google's Place ID Finder</a></div>

      <label>Yelp Business ID</label>
      <input type="text" name="yelp_business_id" placeholder="joes-pizza-new-york">
      <div class="hint">Found in your Yelp business URL: yelp.com/biz/<strong>[this-part]</strong></div>

      <hr class="divider">

      <label>Owner Email (for alerts)</label>
      <input type="email" name="owner_email" placeholder="owner@business.com">

      <label>Alert me on negative reviews?</label>
      <select name="notify_negative">
        <option value="true">Yes — alert on 1-2 star reviews</option>
        <option value="false">No</option>
      </select>

      <label>AI Response Tone</label>
      <select name="response_tone">
        <option value="professional">Professional</option>
        <option value="friendly">Friendly & Warm</option>
        <option value="brief">Brief & Concise</option>
      </select>

      <button type="submit" class="btn">Start Monitoring</button>
    </form>
    <p style="margin-top:16px;font-size:.85rem"><a href="/">← Back</a></p>
  </div>
</div>
</body>
</html>
